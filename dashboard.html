<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>Dashboard — MatteDev</title>
    <style>
        /* Stili rapidi per migliorare il feedback visivo dei bottoni */
        .btn-visita {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-visita:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <nav class="nav-container">
        <img src="https://media.mattedev.com/img/mlogo.jpg" height="30" alt="Logo">
        
        <div class="dynamic-island-wrapper">
            <div class="dynamic-island" id="profileIsland">
                <img src="placeholder.jpg" class="island-pfp" id="navPfp" alt="Profilo">
                <span class="island-name" id="navName">Caricamento...</span>
            </div>
            
            <div id="profileDropdown" class="dropdown">
                <a href="account.html">⚙️ Gestione Account</a>
                <hr style="opacity: 0.1; margin: 5px 0;">
                <button id="logoutBtn" style="color: #ff5f5f; background: none; border: none; cursor: pointer; padding: 0; font: inherit;">Esci</button>
            </div>
        </div>
    </nav>

    <main class="card-container">
        <h1>👋 Bentornato</h1> <br>
        <p style="color: var(--muted)">Seleziona uno strumento dalla tua dashboard.</p>
        <p style="color: var(--muted)">Suggerimento: tieni premuto shift per non aprire il servizio come web app.</p>

        <div class="grid-servizi">
            
            <div class="project-card">
                <img src="https://media.mattedev.com/img/mlogo.jpg" alt="Account Manager" class="project-icon">
                <h3>Account Manager</h3>
                <div class="card-buttons">
                    <a href="account.html" class="btn-visita">Gestisci Account</a>
                </div>
            </div>

            <div class="project-card">
                <img src="https://media.mattedev.com/img/quill/logo.png" alt="Quill" class="project-icon">
                <h3>Quill</h3>
                <div class="card-buttons">
                    <a href="https://quill.mattedev.com" class="btn-visita webview-link">Apri</a>
                </div>
            </div> 

            <div class="project-card">
                <img src="https://media.mattedev.com/img/bitshort/logo.ico" alt="BitShort" class="project-icon">
                <h3>BitShort</h3>
                <div class="card-buttons">
                    <a href="https://bitshort.mattedev.com" class="btn-visita webview-link">Apri</a>
                </div>
            </div>

            <div class="project-card">
                <img src="https://media.mattedev.com/img/mattemeteo/icon.ico" alt="Matte Meteo" class="project-icon">
                <h3>Matte Meteo</h3>
                <div class="card-buttons">
                    <a href="https://meteo.mattedev.com" class="btn-visita webview-link">Apri</a>
                </div>
            </div>
            
            <div class="project-card">
                <img src="https://media.mattedev.com/img/status/status.png" alt="Status" class="project-icon">
                <h3>Status</h3>
                <div class="card-buttons">
                    <a href="https://status.mattedev.com" class="btn-visita webview-link">Apri</a>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="auth.js"></script>
    
  <script type="module" src="web.js"></script>
    


</body>
</html>
