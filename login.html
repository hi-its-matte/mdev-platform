<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login — MatteDev</title>
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #111;
            border: 1px solid #222;
            border-radius: 30px;
            text-align: center;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <h1 id="authTitle" style="margin-bottom: 5px;">Bentornato</h1>
        <p id="authSub" style="color: #666; margin-bottom: 30px;">Accedi per gestire il tuo account</p>

        <div class="form-group" style="text-align: left;">
            <label>Email</label>
            <input type="email" id="email" placeholder="latua@email.com">
            
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
            
            <button class="btn-save" id="authBtn" style="background: #fff; color: #000; margin-top: 10px;">
                Accedi
            </button>
        </div>

        <div style="margin-top: 20px; font-size: 13px; color: #666;">
            <span id="toggleAuth" style="color: #90c0ff; cursor: pointer; text-decoration: underline;">
                Non hai un account? Registrati
            </span>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script>
        // Switch rapido tra login e registrazione
        const toggle = document.getElementById('toggleAuth');
        const title = document.getElementById('authTitle');
        const btn = document.getElementById('authBtn');
        let isLogin = true;

        toggle.onclick = () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? 'Bentornato' : 'Crea Account';
            btn.innerText = isLogin ? 'Accedi' : 'Registrati';
            toggle.innerText = isLogin ? 'Non hai un account? Registrati' : 'Hai già un account? Accedi';
        };
    </script>
</body>
</html>
