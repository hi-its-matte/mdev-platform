<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/other.css">
    <title>Account — MatteDev</title>
    <link href="/css/other.css" rel="stylesheet">
</head>
<body>
    <div class="card-container">
        <div class="matte-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2>Dashboard MatteDev</h2>
                <button class="btn-exit" onclick="window.location.href='dashboard.html'">Esci</button>
            </div>

            <div class="profile-preview-box">
                <img id="currentPfp" src="" class="island-pfp" style="width:70px; height:70px; border-radius:15px; background: #222; object-fit: cover;">
                <div>
                    <h3 id="displayUsername">Caricamento...</h3>
                    <p style="color: var(--muted); font-size: 12px; margin-top: 4px;">Immagine Profilo</p>
                </div>
            </div>

            <div class="form-group">
                <div>
                    <label>Username</label>
                    <input type="text" id="editUsername" placeholder="Inserisci username">
                </div>

                <div>
                    <label>Immagine Profilo</label>
                    <div class="drop-zone" id="dropZone">
                        <div class="upload-icon"></div>
                        <p class="main-text">Trascina qui la tua immagine</p>
                        <p class="sub-text">oppure caricala manualmente</p>
                        <input type="file" id="fileInput" accept="image/*" style="display:none;">
                        <input type="hidden" id="editPfp">
                    </div>
                </div>

                <div>
                    <label>Bio Profilo</label>
                    <textarea id="editBio" rows="3" placeholder="Parlaci di te..."></textarea>
                </div>

                <button class="btn-save" id="saveBtn">Salva impostazioni account</button>
            </div>
        </div>
    </div>

    <div id="warningModal" class="modal">
        <div class="modal-content">
            <h3 style="color: #ff4d4d;">⚠️ Avviso Importante</h3>
            <p>L'immagine verrà caricata su <b>Catbox.moe</b>.<br><br>
            Il file sarà <b>pubblico</b> e non potrà essere rimosso. 
            Non ci assumiamo responsabilità per il contenuto pubblicato.</p>
            
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" id="closeModal">Annulla</button>
                <button class="btn-modal btn-confirm" id="confirmUpload">Accetto e Carico</button>
            </div>
        </div>
    </div>

    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/Pfp.js"></script>
    <script type="module" src="/js/account.js"></script>
</body>
</html>
