<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/other.css">
    <title>Verifica Email — MatteDev</title>
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #111;
            border: 1px solid #222;
            border-radius: 30px;
            text-align: center;
        }
        .info-text { color: #aaa; line-height: 1.6; margin-bottom: 20px; }
        .spam-notice {
            background: rgba(144, 192, 255, 0.1);
            color: #90c0ff;
            padding: 15px;
            border-radius: 15px;
            font-size: 13px;
            margin-top: 20px;
        }
        .btn-resend {
            background: #fff; color: #000; width: 100%; 
            border: none; border-radius: 10px; padding: 12px; 
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <h1 style="margin-bottom: 10px;">Verifica la tua Email</h1>
        <p class="info-text">Abbiamo inviato un link di conferma al tuo indirizzo. Clicca sul link per attivare l'account.</p>

        <button class="btn-resend" id="resendEmail">
            Invia di nuovo
        </button>

        <div class="spam-notice">
            <strong>Nota:</strong> Controlla anche la cartella <b>SPAM</b>.
        </div>

        <div style="margin-top: 20px; font-size: 13px;">
            <a href="/pages/login.html" style="color: #666; text-decoration: none;">Ho verificato, Entra.</a>
        </div>
    </div>

    <script type="module" src="/js/auth.js"></script>
</body>
</html>
