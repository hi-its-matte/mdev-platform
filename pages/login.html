<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/other.css">
    <title>Login — MatteDev</title>
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
            font-family: sans-serif;
            color: #fff;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #111;
            border: 1px solid #222;
            border-radius: 30px;
            text-align: center;
        }
        .form-group { text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            box-sizing: border-box;
        }
        .btn-save {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-save:hover { opacity: 0.8; }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <h1 id="authTitle" style="margin-bottom: 5px;">Bentornato</h1>
        <p id="authSub" style="color: #666; margin-bottom: 30px;">Accedi per gestire il tuo account</p>

        <div class="form-group">
            <div id="usernameWrapper" style="display: none;">
                <label>Username</label>
                <input type="text" id="username" placeholder="Il tuo nome">
            </div>

            <label>Email</label>
            <input type="email" id="email" placeholder="latua@email.com">
            
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
            
            <button class="btn-save" id="authBtn" style="background: #fff; color: #000; margin-top: 10px;">
                Accedi
            </button>
        </div>

        <div style="margin-top: 20px; font-size: 13px; color: #666;">
            <span id="toggleAuth" style="color: #90c0ff; cursor: pointer; text-decoration: underline;">
                Non hai un account? Registrati
            </span>
            <a href="privacy.html">privacy</a>
        </div>
    </div>

    <script type="module" src="/js/auth.js"></script>
    <script>
        const toggle = document.getElementById('toggleAuth');
        const title = document.getElementById('authTitle');
        const btn = document.getElementById('authBtn');
        const userWrapper = document.getElementById('usernameWrapper');
        const subText = document.getElementById('authSub');
        let isLogin = true;

        toggle.onclick = () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? 'Bentornato' : 'Crea Account';
            subText.innerText = isLogin ? 'Accedi per gestire il tuo account' : 'Inizia la tua avventura con noi';
            btn.innerText = isLogin ? 'Accedi' : 'Registrati';
            userWrapper.style.display = isLogin ? 'none' : 'block';
            toggle.innerText = isLogin ? 'Non hai un account? Registrati' : 'Hai già un account? Accedi';
        };
    </script>
</body>
</html>
